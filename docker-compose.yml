name: getGreen

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - getgreen-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - getgreen-net
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Rajdeep1234}
      MYSQL_USER: ${MYSQL_USER:-RAJ}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Rajdeep1234}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - getgreen-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./authService
    ports:
      - "9811:9811"
    environment:
      VM_HOST_IP: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/expense_tracker_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-RAJ}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-Rajdeep1234}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - getgreen-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9811/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  user-service:
    build: ./userService
    ports:
      - "9810:9810"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userservice?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-RAJ}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-Rajdeep1234}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - getgreen-net

  expense-service:
    build: ./expenseService
    ports:
      - "9820:9820"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-RAJ}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Rajdeep1234}
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - getgreen-net

  ds-service:
    build: ./dsService
    ports:
      - "8010:8010"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - getgreen-net

  kong-database:
    image: postgres:15
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - getgreen-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:3.7
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    command: kong migrations bootstrap
    networks:
      - getgreen-net

  kong:
    image: kong:3.7
    depends_on:
      kong-migration:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      expense-service:
        condition: service_started
      ds-service:
        condition: service_started
    ports:
      - "8000:8000" # Proxy (your app calls THIS)
      - "8001:8001" # Admin API (configure routes here)
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    networks:
      - getgreen-net

volumes:
  mysql-data:
  kong-db-data:

networks:
  getgreen-net:
    driver: bridge
